# Status page configuration
status-website:
  cname: status.bugagent.com
  logoUrl: https://bugagent.com/favicon.svg
  name: bugAgent Status
  introTitle: "**bugAgent** system status"
  introMessage: Real-time monitoring for all bugAgent services. This page is updated every 5 minutes.
  theme: dark
  navbar:
    - title: Homepage
      href: https://bugagent.com
    - title: Dashboard
      href: https://app.bugagent.com
    - title: Documentation
      href: https://bugagent.com/docs

# Check frequency (every 5 minutes)
workflowSchedule:
  uptime: "*/5 * * * *"
  graphs: "0 */6 * * *"
  staticSite: "0 */12 * * *"
  summary: "0 0 * * *"

